<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate Tanzeem Icons</title>
  <style>
    body { font-family: sans-serif; padding: 32px; background: #f1f5f9; }
    h2 { color: #0f4a29; margin-bottom: 6px; }
    p  { color: #64748b; margin-bottom: 20px; }
    .preview { display: flex; gap: 24px; flex-wrap: wrap; margin: 24px 0; align-items: flex-end; }
    .preview div { text-align: center; font-size: 12px; color: #555; }
    canvas { border-radius: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.18); display: block; margin-bottom: 6px; }
    button { background: #0f4a29; color: white; border: none; padding: 13px 30px;
             border-radius: 10px; font-size: 15px; cursor: pointer; margin-top: 8px;
             font-weight: 600; }
    button:hover { background: #16a34a; }
    .done { background: #dcfce7; border: 1px solid #86efac; padding: 16px; border-radius: 8px;
            color: #166534; margin-top: 16px; display: none; font-weight: 500; }
    code { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    #status { color: #64748b; font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>🕌 Tanzeem Icon Generator</h2>
  <p>Renders the SVG icon to PNG at all required sizes. Download then replace the files in <code>icons/</code> and push to GitHub.</p>
  <div class="preview" id="previews"></div>
  <button onclick="generateAll()">⬇ Download All Icons</button>
  <div id="status"></div>
  <div class="done" id="done">
    ✅ <strong>Done!</strong> Move the downloaded files into your <code>icons/</code> folder, then push to GitHub.
  </div>

  <script>
    const SVG_URL = 'icon.svg';

    const ICONS = [
      { size: 512, name: 'icon-512.png',          maskable: false, preview: 128 },
      { size: 512, name: 'icon-maskable-512.png', maskable: true,  preview: 128 },
      { size: 192, name: 'icon-192.png',          maskable: false, preview: 96  },
      { size: 180, name: 'apple-touch-icon.png',  maskable: false, preview: 90  },
    ];

    /* Load the SVG as an Image once, then reuse for all sizes */
    function loadSvgImage() {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload  = () => resolve(img);
        img.onerror = reject;
        /* Cache-bust so edits to icon.svg are picked up */
        img.src = SVG_URL + '?v=' + Date.now();
      });
    }

    function renderIcon(img, size, maskable) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');

      if (maskable) {
        /* Maskable: fill entire square (no rounded corners) */
        ctx.drawImage(img, 0, 0, size, size);
      } else {
        /* Clip to rounded square before drawing */
        const r = size * 0.176; /* matches rx="90" on 512 */
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size - r);
        ctx.quadraticCurveTo(size, size, size - r, size);
        ctx.lineTo(r, size);
        ctx.quadraticCurveTo(0, size, 0, size - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(img, 0, 0, size, size);
      }
      return canvas;
    }

    async function buildPreviews() {
      const status = document.getElementById('status');
      status.textContent = 'Loading SVG…';
      let img;
      try {
        img = await loadSvgImage();
      } catch(e) {
        status.textContent = '⚠️ Could not load icon.svg — make sure this page is served from the icons/ folder.';
        return;
      }
      status.textContent = '';

      const wrap = document.getElementById('previews');
      wrap.innerHTML = '';
      ICONS.forEach(({ size, name, maskable, preview }) => {
        const full   = renderIcon(img, size, maskable);
        /* Scale-down preview canvas */
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = preview;
        canvas.getContext('2d').drawImage(full, 0, 0, preview, preview);
        const div = document.createElement('div');
        div.appendChild(canvas);
        div.appendChild(document.createTextNode(name + '\n' + size + '×' + size));
        div.style.whiteSpace = 'pre';
        wrap.appendChild(div);
      });
    }

    async function generateAll() {
      const status = document.getElementById('status');
      status.textContent = 'Generating…';
      let img;
      try {
        img = await loadSvgImage();
      } catch(e) {
        status.textContent = '⚠️ Could not load icon.svg';
        return;
      }

      ICONS.forEach(({ size, name, maskable }) => {
        const canvas = renderIcon(img, size, maskable);
        const a = document.createElement('a');
        a.download = name;
        a.href = canvas.toDataURL('image/png');
        a.click();
      });

      status.textContent = '';
      document.getElementById('done').style.display = 'block';
    }

    window.onload = buildPreviews;
  </script>
</body>
</html>
