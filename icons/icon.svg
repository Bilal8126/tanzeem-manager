      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Left minaret -->
  <rect x="112" y="180" width="32" height="195" fill="white" opacity="0.95"/>
  <polygon points="112,180 128,142 144,180" fill="white" opacity="0.95"/>
  <circle cx="128" cy="135" r="8" fill="#22c55e"/>

  <!-- Right minaret -->
  <rect x="368" y="180" width="32" height="195" fill="white" opacity="0.95"/>
  <polygon points="368,180 384,142 400,180" fill="white" opacity="0.95"/>
  <circle cx="384" cy="135" r="8" fill="#22c55e"/>

  <!-- Side domes -->
  <path d="M152 258 Q188 212 224 258Z" fill="white" opacity="0.85"/>
  <path d="M288 258 Q324 212 360 258Z" fill="white" opacity="0.85"/>

