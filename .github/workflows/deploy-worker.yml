name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker.js'
      - 'wrangler.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - uses: actions/checkout@v4

      - name: Prepare clean deploy directory
        run: |
          mkdir -p /tmp/worker-deploy
          cp worker.js /tmp/worker-deploy/
          cp wrangler.toml /tmp/worker-deploy/

      - name: Deploy to Cloudflare Workers
        working-directory: /tmp/worker-deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          GITHUB_WORKSPACE: /tmp/worker-deploy
        run: npx --yes wrangler@3.70.0 deploy
