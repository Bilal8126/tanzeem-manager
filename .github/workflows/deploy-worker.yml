name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker.js'
      - 'wrangler.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          mkdir -p /tmp/worker-deploy
          cp worker.js /tmp/worker-deploy/
          cp wrangler.toml /tmp/worker-deploy/
          cd /tmp/worker-deploy
          npx --yes wrangler@3.99.0 deploy
